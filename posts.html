<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Notes · VTA ICT L5 Community</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
    <link rel="stylesheet" href="assets/css/animations.css">
    <style>
        .page-header {
            margin-bottom: 2rem;
        }

        .page-header h1 {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .page-header p {
            color: var(--text-secondary);
            font-size: 1rem;
        }

        .note-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            margin: 0.75rem 0;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .note-meta span {
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .note-actions {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-top: 1rem;
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            background: var(--card-color);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            font-size: 1.2rem;
        }

        .loading-indicator {
            text-align: center;
            padding: 2rem;
            color: var(--text-secondary);
        }
    </style>
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="container">
            <div class="logo">VTA ICT L5 Community</div>
            <button class="mobile-menu-btn" aria-label="Menu">☰</button>
            <div class="nav-menu">
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="lesson.html">Lessons</a></li>
                    <li><a href="posts.html" class="active">Community</a></li>
                </ul>
                <div class="nav-buttons">
                    <a href="upload.html" class="btn btn-outline">Add Notes</a>
                    <button id="theme-toggle" class="btn" aria-label="Toggle theme">☀️</button>
                </div>
            </div>
        </div>
    </nav>

    <main>
        <section class="section">
            <div class="container">
                <div class="page-header">
                    <h1>📚 Community Notes</h1>
                    <p>Browse approved notes shared by fellow VTA ICT Level 5 students.</p>
                </div>

                <!-- Notes will be injected here by posts.js -->
                <div id="notesGrid" class="grid">
                    <div class="loading-indicator">Loading community notes…</div>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>© 2025 VTA ICT L5 Community. All rights reserved.</p>
            <p>VTA ICT Level 5 Community — Academic excellence through collaboration.</p>
        </div>
    </footer>

    <!-- Scripts: Supabase CDN must come first, then our client init, then page logic -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/supabase.js"></script>
    <script src="assets/js/ui.js"></script>
    <script src="assets/js/posts.js"></script>
</body>

</html>
